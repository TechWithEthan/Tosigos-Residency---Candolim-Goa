<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tosigos Residency – Coming Soon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: url('https://images.unsplash.com/photo-1501117716987-c8e3f1c1f1a0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .uc-card {
      background: rgba(0, 0, 0, 0.65);
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      padding: 2rem;
      max-width: 900px;
      width: 100%;
      text-align: center;
    }

    .brand-title {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .title {
      font-size: 1.75rem;
      font-weight: 600;
      margin-top: .5rem;
    }

    .gif-frame img {
      max-width: 250px;
    }

    .progress {
      height: 10px;
      background: rgba(255,255,255,.2);
    }
    .progress-bar {
      background: linear-gradient(90deg, #f8b400, #ff6b6b);
      animation: loading 2.6s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 15%; }
      50% { width: 70%; }
      100% { width: 15%; }
    }

    .footer-note { opacity: .85; }
  </style>
</head>
<body>
  <main class="uc-card">
    <div class="mb-3">
      <h1 class="brand-title">🏨 Tosigos Residency</h1>
      <h2 class="title">Our International Hotel Website is Coming Soon</h2>
      <p class="lead text-white-50">Experience luxury, comfort, and elegance worldwide.</p>
    </div>

    <!-- 3D GIF area -->
    <div class="gif-frame mb-4">
      <img src="https://media.giphy.com/media/xT9DPCU60mRbtGw7ZS/giphy.gif" alt="Under Construction 3D GIF" />
    </div>

    <!-- Progress indicator (cosmetic) -->
    <div class="mb-3">
      <div class="progress" role="progressbar">
        <div class="progress-bar" style="width: 40%"></div>
      </div>
    </div>

    <p class="footer-note mb-4">We’re finalizing details, please check back soon.</p>

    <!-- CTA Buttons -->
    <div class="d-flex flex-wrap justify-content-center gap-3">
      <a class="btn btn-warning btn-lg rounded-pill px-4" href="#" role="button">Notify Me</a>
      <a class="btn btn-light btn-lg rounded-pill px-4" href="#" role="button">Back to Home</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
